  <!-- Seeds - just 4, slightly random placement -->
  <ellipse cx="100" cy="52" rx="2.5" ry="4" fill="#1a1a1a" opacity="0.85"/>
  <ellipse cx="140" cy="80" rx="2.5" ry="4" fill="#1a1a1a" opacity="0.85" transform="rotate(55,140,80)"/>
  <ellipse cx="100" cy="146" rx="2.5" ry="4" fill="#1a1a1a" opacity="0.85" transform="rotate(180,100,146)"/>
  <ellipse cx="62" cy="105" rx="2.5" ry="4" fill="#1a1a1a" opacity="0.85" transform="rotate(270,62,105)"/>

  <!-- Core -->
