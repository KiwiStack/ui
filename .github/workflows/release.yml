name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: deb
          - os: windows-latest
            target: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm --filter kiwi-app tauri build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/kiwi-app/src-tauri/target/release/bundle/deb/*.deb
            apps/kiwi-app/src-tauri/target/release/bundle/nsis/*.exe

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter kiwi-web build

      - name: Create tarball
        run: tar -czf kiwi-web-${{ github.ref_name }}.tar.gz -C apps/kiwi-web/build .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: kiwi-web-${{ github.ref_name }}.tar.gz
